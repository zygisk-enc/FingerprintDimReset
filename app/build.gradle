plugins {
    id 'com.android.application'
}

android {
    namespace 'com.zygisk_enc.fingerprintreset'
    compileSdk 36

    defaultConfig {
        applicationId "com.zygisk_enc.fingerprintreset"
        minSdk 26
        targetSdk 36
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    compileOnly 'de.robv.android.xposed:api:82'
}
